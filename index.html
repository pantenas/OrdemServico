<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ponto das Antenas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">
    <!-- ===== LOGIN PAGE ===== -->
    <div id="login-container" class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">📡</div>
                <h1>Ponto das Antenas</h1>
                <p>Acesse o sistema de gerenciamento</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <input type="email" id="loginEmail" placeholder="admin@pontodasantenas.com" required>
                </div>
                <div class="form-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
