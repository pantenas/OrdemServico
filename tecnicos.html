<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe — Ponto das Antenas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="theme-dark page-orange">
    <div id="app-container">
        <main class="main-content">
            <header class="page-header">
                <h1>Equipe</h1>
                <div class="header-actions">
                    <button class="header-btn btn-primary" onclick="openModal('modalTecnico')">
                        <span class="material-symbols-rounded">person_add</span>
                        Novo Colaborador
                    </button>
                </div>
            </header>
            <div id="tecnicosContainer" class="list-container"></div>
        </main>
    </div>

    <!-- MODAL: COLABORADOR -->
    <div id="modalTecnico" class="modal">
        <div class="modal-content modal-small">
            <header class="modal-header">
                <h2 id="modalTecnicoTitle">Novo Colaborador</h2>
                <button class="modal-close" onclick="closeModal('modalTecnico')">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </header>
            <form id="tecnicoForm" class="modal-body">
                <input type="hidden" id="tecnicoId">
                <div class="form-group">
                    <label for="tecnicoNome">Nome Completo</label>
                    <input type="text" id="tecnicoNome" required>
                </div>
                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="tecnicoEmail">E-mail de Acesso</label>
                        <input type="email" id="tecnicoEmail" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="tecnicoSenha">Senha Provisória</label>
                        <input type="password" id="tecnicoSenha" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="tecnicoRole">Cargo / Nível</label>
                        <select id="tecnicoRole">
                            <option value="Administrador">Administrador</option>
                            <option value="Vendedor">Vendedor</option>
                            <option value="Técnico">Técnico</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="tecnicoEspecialidade">Especialidade</label>
                        <input type="text" id="tecnicoEspecialidade" placeholder="Ex: Antenas rurais">
                    </div>
                </div>
                <div class="form-group">
                    <label for="tecnicoTelefone">WhatsApp / Telefone</label>
                    <input type="text" id="tecnicoTelefone">
                </div>
                <div class="modal-footer">
                    <button type="button" class="header-btn btn-secondary"
                        onclick="closeModal('modalTecnico')">Cancelar</button>
                    <button type="submit" class="header-btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderTecnicosGrid();
        });
    </script>
</body>

</html>
