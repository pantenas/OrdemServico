<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas — Ponto das Antenas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="theme-dark">
    <div id="app-container">
        <main class="main-content">
            <header class="page-header">
                <h1>Vendas</h1>
                <div class="header-actions">
                    <button class="header-btn btn-primary" onclick="openModal('modalVenda')">
                        <span class="material-symbols-rounded">add_shopping_cart</span>
                        Nova Venda
                    </button>
                </div>
            </header>

            <div class="table-filters">
                <div class="search-box">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" id="searchVendas" placeholder="Buscar venda, SCUA ou CAID..."
                        oninput="renderVendasList()">
                </div>
            </div>

            <div id="vendasList" class="list-container">
                <!-- As vendas serão renderizadas aqui em formato de linhas pelo app.js -->
            </div>
        </main>
    </div>

    <!-- MODAL: VENDA -->
    <div id="modalVenda" class="modal">
        <div class="modal-content modal-small">
            <header class="modal-header">
                <h2 id="modalVendaTitle">Registrar Venda</h2>
                <button class="modal-close" onclick="closeModal('modalVenda')">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </header>
            <form id="vendaForm" class="modal-body">
                <input type="hidden" id="vendaId">
                <div class="form-group">
                    <label for="vendaCodigo">Código da Venda</label>
                    <input type="text" id="vendaCodigo" placeholder="Ex: VEN-001" required>
                </div>

                <div class="form-group">
                    <label for="vendaSCUA">SCUA / SÉRIE</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="vendaSCUA" placeholder="Código de barras" required>
                        <button type="button" class="btn-icon" onclick="startBarcodeScanner('vendaSCUA')"
                            title="Ler Código de Barras">
                            <span class="material-symbols-rounded">barcode_scanner</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="vendaCAID">CAID / SÉRIE</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="vendaCAID" placeholder="Código de barras" required>
                        <button type="button" class="btn-icon" onclick="startBarcodeScanner('vendaCAID')"
                            title="Ler Código de Barras">
                            <span class="material-symbols-rounded">barcode_scanner</span>
                        </button>
                    </div>
                </div>

                <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="vendaLancada" style="width: 20px; height: 20px; cursor: pointer;">
                    <label for="vendaLancada" style="margin: 0; cursor: pointer;">Venda Lançada?</label>
                </div>

                <div class="form-group">
                    <label>Fotos do Aparelho / Garantia</label>
                    <div class="upload-area" onclick="document.getElementById('vendaFotos').click()">
                        <span class="material-symbols-rounded">cloud_upload</span>
                        <p>Toque para adicionar fotos</p>
                        <input type="file" id="vendaFotos" hidden multiple accept="image/*"
                            onchange="handleFotoUpload(event)">
                    </div>
                    <div id="fotosPreview" class="fotos-preview"></div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="header-btn btn-secondary"
                        onclick="closeModal('modalVenda')">Cancelar</button>
                    <button type="submit" class="header-btn btn-primary">Salvar Venda</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderVendasList();
        });
    </script>
</body>

</html>
